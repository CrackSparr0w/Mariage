<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mélina & Jordan — 29 Août 2026</title>
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #f5f5f5;
            font-family: 'Century Gothic', 'Futura', 'Trebuchet MS', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* PARTICULES */
        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 2px; height: 2px;
            background: #c9a84c;
            border-radius: 50%;
            animation: float linear infinite;
            opacity: 0;
        }

        @keyframes float {
            0%   { transform: translateY(100vh); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        /* HEADER */
        .header {
            text-align: center;
            margin-bottom: 50px;
            z-index: 1;
        }

        .header .et {
            color: #c9a84c;
            font-size: 0.85rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header h1 {
            font-size: 5rem;
            font-weight: normal;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #c9a84c, #f5e6c8, #c9a84c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Georgia', 'Times New Roman', serif;
            font-style: italic;
            line-height: 1.1;
            margin-bottom: 15px;
        }

        .header .date {
            color: #666;
            font-size: 0.8rem;
            letter-spacing: 7px;
            text-transform: uppercase;
            margin-top: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        /* CARDS */
        .card {
            background: linear-gradient(145deg, #141414, #1a1a1a);
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 700px;
            margin-bottom: 24px;
            z-index: 1;
        }

        .card-title {
            color: #c9a84c;
            font-size: 0.75rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, #2a2a2a, transparent);
        }

        /* PHOTO */
        .photo-container {
            width: 100%;
            height: 300px;
            border-radius: 10px;
            overflow: hidden;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-placeholder {
            color: #333;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-align: center;
        }

        /* COMPTE À REBOURS */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .countdown-item {
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 20px 24px;
            text-align: center;
            min-width: 90px;
        }

        .countdown-number {
            font-size: 3rem;
            font-weight: bold;
            color: #c9a84c;
            line-height: 1;
            font-family: 'Georgia', serif;
        }

        .countdown-label {
            font-size: 0.6rem;
            letter-spacing: 4px;
            color: #555;
            text-transform: uppercase;
            margin-top: 8px;
        }

        /* TÂCHES */
        .task-input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .task-input-row input {
            flex: 1;
            min-width: 180px;
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 12px 16px;
            color: #f5f5f5;
            font-size: 0.85rem;
            outline: none;
            font-family: inherit;
            transition: border 0.2s;
        }

        .task-input-row input:focus {
            border-color: #c9a84c;
        }

        .task-input-row select {
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 12px 14px;
            color: #f5f5f5;
            font-size: 0.85rem;
            outline: none;
            font-family: inherit;
            cursor: pointer;
        }

        .task-input-row select option {
            background: #1a1a1a;
        }

        .btn-add {
            background: linear-gradient(135deg, #c9a84c, #a07830);
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            color: #0a0a0a;
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
            transition: opacity 0.2s;
        }

        .btn-add:hover { opacity: 0.85; }

        /* FILTRES */
        .filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid #2a2a2a;
            border-radius: 20px;
            padding: 6px 14px;
            color: #666;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            border-color: #c9a84c;
            color: #c9a84c;
        }

        .filter-btn.active {
            background: #c9a84c;
            border-color: #c9a84c;
            color: #0a0a0a;
        }

        /* PROGRESS */
        .progress-bar {
            background: #111;
            border-radius: 10px;
            height: 4px;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, #c9a84c, #f5e6c8);
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        .progress-text {
            color: #555;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-align: right;
            margin-bottom: 16px;
        }

        /* TASK ITEMS */
        .task-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 0;
            border-bottom: 1px solid #1e1e1e;
            transition: opacity 0.2s;
        }

        .task-item:last-child { border-bottom: none; }
        .task-item.done { opacity: 0.5; }

        .custom-checkbox {
            width: 22px;
            height: 22px;
            border: 1px solid #3a3a3a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s;
            font-size: 0.75rem;
        }

        .custom-checkbox.checked {
            background: #c9a84c;
            border-color: #c9a84c;
            color: #0a0a0a;
        }

        .task-info {
            flex: 1;
        }

        .task-text {
            font-size: 0.9rem;
            margin-bottom: 4px;
        }

        .task-item.done .task-text {
            text-decoration: line-through;
            color: #555;
        }

        .task-category {
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #555;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .delete-btn {
            background: transparent;
            border: none;
            color: #333;
            cursor: pointer;
            font-size: 1rem;
            padding: 4px;
            transition: color 0.2s;
        }

        .delete-btn:hover { color: #c0392b; }

        /* MUSIQUE */
        .music-player {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(145deg, #141414, #1e1e1e);
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            z-index: 100;
            min-width: 220px;
        }

        .play-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #c9a84c, #a07830);
            border: none;
            color: #0a0a0a;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: opacity 0.2s;
        }

        .play-btn:hover { opacity: 0.85; }

        .music-info {
            flex: 1;
        }

        .music-title {
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #c9a84c;
            margin-bottom: 4px;
        }

        .music-file {
            font-size: 0.7rem;
            color: #444;
            letter-spacing: 1px;
        }

        .eq-bars {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 20px;
        }

        .eq-bar {
            width: 3px;
            background: #c9a84c;
            border-radius: 2px;
            animation: eq 0.8s ease-in-out infinite alternate;
        }

        .eq-bar:nth-child(2) { animation-delay: 0.2s; }
        .eq-bar:nth-child(3) { animation-delay: 0.4s; }

        @keyframes eq {
            0%  { height: 4px; }
            100%{ height: 18px; }
        }

        .eq-bars.paused .eq-bar { animation-play-state: paused; }

        .volume-slider {
            width: 60px;
            accent-color: #c9a84c;
        }
    </style>
</head>
<body>

    <!-- PARTICULES -->
    <div class="particles" id="particles"></div>

    <!-- HEADER -->
    <div class="header">
        <div class="et">
            <i class="ph ph-shooting-star"></i>
            Mélina &amp; Jordan
            <i class="ph ph-shooting-star"></i>
        </div>
        <h1>Notre Mariage</h1>
        <div class="date">
            <i class="ph ph-calendar-blank"></i>
            29 Août 2026
            <i class="ph ph-map-pin"></i>
            France
        </div>
    </div>

    <!-- PHOTO -->
    <div class="card">
        <div class="card-title">
            <i class="ph ph-image"></i>
            Notre Photo
        </div>
        <div class="photo-container">
            <img src="photo.jpg" alt="Mélina & Jordan"
                 onerror="this.style.display='none';document.getElementById('photoPlaceholder').style.display='block'">
            <div class="photo-placeholder" id="photoPlaceholder" style="display:none">
                <i class="ph ph-image" style="font-size:2rem;color:#2a2a2a;display:block;margin-bottom:10px"></i>
                Ajoutez votre photo<br>
                <span style="font-size:0.7rem;color:#222">Uploadez photo.jpg sur GitHub</span>
            </div>
        </div>
    </div>

    <!-- COMPTE À REBOURS -->
    <div class="card">
        <div class="card-title">
            <i class="ph ph-hourglass"></i>
            Compte à Rebours
        </div>
        <div class="countdown">
            <div class="countdown-item">
                <div class="countdown-number" id="days">00</div>
                <div class="countdown-label">Jours</div>
            </div>
            <div class="countdown-item">
                <div class="countdown-number" id="hours">00</div>
                <div class="countdown-label">Heures</div>
            </div>
            <div class="countdown-item">
                <div class="countdown-number" id="minutes">00</div>
                <div class="countdown-label">Minutes</div>
            </div>
            <div class="countdown-item">
                <div class="countdown-number" id="seconds">00</div>
                <div class="countdown-label">Secondes</div>
            </div>
        </div>
    </div>

    <!-- TÂCHES -->
    <div class="card">
        <div class="card-title">
            <i class="ph ph-check-square"></i>
            Liste des Tâches
        </div>

        <div class="task-input-row">
            <input type="text" id="taskInput" placeholder="Nouvelle tâche..." onkeydown="if(event.key==='Enter')addTask()">
            <select id="taskCategory">
                <option value="lieu">Lieu</option>
                <option value="tenues">Tenues</option>
                <option value="traiteur">Traiteur</option>
                <option value="musique">Musique</option>
                <option value="photos">Photos</option>
                <option value="invites">Invités</option>
                <option value="autre">Autre</option>
            </select>
            <button class="btn-add" onclick="addTask()">
                <i class="ph ph-plus"></i> Ajouter
            </button>
        </div>

        <div class="filters">
            <button class="filter-btn active" onclick="setFilter('all', this)">
                <i class="ph ph-squares-four"></i> Tout
            </button>
            <button class="filter-btn" onclick="setFilter('lieu', this)">
                <i class="ph ph-map-pin"></i> Lieu
            </button>
            <button class="filter-btn" onclick="setFilter('tenues', this)">
                <i class="ph ph-coat-hanger"></i> Tenues
            </button>
            <button class="filter-btn" onclick="setFilter('traiteur', this)">
                <i class="ph ph-fork-knife"></i> Traiteur
            </button>
            <button class="filter-btn" onclick="setFilter('musique', this)">
                <i class="ph ph-music-note"></i> Musique
            </button>
            <button class="filter-btn" onclick="setFilter('photos', this)">
                <i class="ph ph-camera"></i> Photos
            </button>
            <button class="filter-btn" onclick="setFilter('invites', this)">
                <i class="ph ph-users"></i> Invités
            </button>
            <button class="filter-btn" onclick="setFilter('autre', this)">
                <i class="ph ph-dots-three"></i> Autre
            </button>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
        <div class="progress-text" id="progressText">Aucune tâche</div>

        <div id="taskList"></div>
    </div>

    <!-- LECTEUR MUSIQUE -->
    <div class="music-player">
        <button class="play-btn" onclick="togglePlay()" id="playBtn">
            <i class="ph ph-play" id="playIcon"></i>
        </button>
        <div class="music-info">
            <div class="music-title">Notre Chanson</div>
            <div class="music-file">musique.mp3</div>
        </div>
        <div class="eq-bars paused" id="eq">
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
        </div>
        <input type="range" class="volume-slider" min="0" max="1" step="0.01"
               value="0.5" oninput="setVolume(this.value)">
    </div>

    <audio id="audio" src="musique.mp3" loop></audio>

    <script>
        // ── DONNÉES ───────────────────────────────────────────────
        const categories = {
            lieu:     { label: 'Lieu',     icon: 'ph-map-pin' },
            tenues:   { label: 'Tenues',   icon: 'ph-coat-hanger' },
            traiteur: { label: 'Traiteur', icon: 'ph-fork-knife' },
            musique:  { label: 'Musique',  icon: 'ph-music-note' },
            photos:   { label: 'Photos',   icon: 'ph-camera' },
            invites:  { label: 'Invités',  icon: 'ph-users' },
            autre:    { label: 'Autre',    icon: 'ph-dots-three' }
        };

        let tasks         = JSON.parse(localStorage.getItem('weddingTasks') || '[]');
        let currentFilter = 'all';
        let playing       = false;
        const audio       = document.getElementById('audio');
        audio.volume      = 0.5;

        // ── TÂCHES ────────────────────────────────────────────────
        function saveTasks() {
            localStorage.setItem('weddingTasks', JSON.stringify(tasks));
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            const text  = input.value.trim();
            if (!text) return;
            tasks.push({
                id:       Date.now(),
                text:     text,
                category: document.getElementById('taskCategory').value,
                done:     false
            });
            input.value = '';
            saveTasks();
            renderTasks();
        }

        function toggleTask(id) {
            const t = tasks.find(t => t.id === id);
            if (t) { t.done = !t.done; saveTasks(); renderTasks(); }
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
            renderTasks();
        }

        function setFilter(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderTasks();
        }

        function renderTasks() {
            const list     = document.getElementById('taskList');
            const filtered = currentFilter === 'all'
                ? tasks
                : tasks.filter(t => t.category === currentFilter);

            const done  = tasks.filter(t => t.done).length;
            const total = tasks.length;
            const pct   = total ? Math.round((done / total) * 100) : 0;

            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('progressText').textContent =
                total === 0 ? 'Aucune tâche' :
                `${done} / ${total} tâche${total > 1 ? 's' : ''} complétée${done > 1 ? 's' : ''}`;

            if (filtered.length === 0) {
                list.innerHTML = '<p style="text-align:center;color:#333;font-size:0.8rem;letter-spacing:2px;padding:30px 0">Aucune tâche</p>';
                return;
            }

            list.innerHTML = filtered.map(task => {
                const cat = categories[task.category] || categories['autre'];
                return `
                <div class="task-item ${task.done ? 'done' : ''}">
                    <div class="custom-checkbox ${task.done ? 'checked' : ''}" onclick="toggleTask(${task.id})">
                        ${task.done ? '<i class="ph ph-check"></i>' : ''}
                    </div>
                    <div class="task-info">
                        <div class="task-text">${task.text}</div>
                        <span class="task-category">
                            <i class="ph ${cat.icon}"></i> ${cat.label}
                        </span>
                    </div>
                    <button class="delete-btn" onclick="deleteTask(${task.id})">
                        <i class="ph ph-trash"></i>
                    </button>
                </div>`;
            }).join('');
        }

        // ── MUSIQUE ───────────────────────────────────────────────
        function togglePlay() {
            const playIcon = document.getElementById('playIcon');
            const eq       = document.getElementById('eq');
            if (playing) {
                audio.pause();
                playIcon.className = 'ph ph-play';
                eq.classList.add('paused');
            } else {
                audio.play();
                playIcon.className = 'ph ph-pause';
                eq.classList.remove('paused');
            }
            playing = !playing;
        }

        function setVolume(v) {
            audio.volume = v;
        }

        // ── COMPTE À REBOURS ──────────────────────────────────────
        function updateCountdown() {
            const target = new Date('2026-08-29T00:00:00');
            const now    = new Date();
            const diff   = target - now;

            if (diff <= 0) {
                document.querySelector('.countdown').innerHTML =
                    '<p style="color:#c9a84c;font-size:1.5rem;letter-spacing:3px">✦ C\'est le grand jour ! ✦</p>';
                return;
            }

            const days    = Math.floor(diff / 86400000);
            const hours   = Math.floor((diff % 86400000) / 3600000);
            const minutes = Math.floor((diff % 3600000)  / 60000);
            const seconds = Math.floor((diff % 60000)    / 1000);

            document.getElementById('days').textContent    = String(days).padStart(2, '0');
            document.getElementById('hours').textContent   = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);

        // ── PARTICULES ────────────────────────────────────────────
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.style.left              = Math.random() * 100 + '%';
                p.style.animationDuration = (Math.random() * 15 + 10) + 's';
                p.style.animationDelay    = (Math.random() * 10) + 's';
                if (Math.random() > 0.7) p.style.background = '#fff';
                container.appendChild(p);
            }
        }

        createParticles();
        renderTasks();
    </script>
</body>
</html>
