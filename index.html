<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mélina & Jordan — 29 Août 2026</title>
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #f5f5f5;
            font-family: 'Century Gothic', 'Futura', 'Trebuchet MS', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #c9a84c;
            border-radius: 50%;
            animation: float linear infinite;
            opacity: 0;
        }

        @keyframes float {
            0%   { transform: translateY(100vh); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        /* MUSIC PLAYER */
        .music-player {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid rgba(201, 168, 76, 0.3);
            border-radius: 50px;
            padding: 10px 18px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(201, 168, 76, 0.1);
            transition: all 0.3s;
        }

        .music-player:hover {
            border-color: rgba(201, 168, 76, 0.6);
            box-shadow: 0 0 40px rgba(201, 168, 76, 0.2);
        }

        .play-btn {
            background: rgba(201, 168, 76, 0.1);
            border: 1px solid rgba(201, 168, 76, 0.4);
            border-radius: 50%;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #c9a84c;
            font-size: 1.1rem;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .play-btn:hover {
            background: rgba(201, 168, 76, 0.25);
        }

        .music-info {
            display: flex;
            flex-direction: column;
        }

        .music-title {
            font-size: 0.7rem;
            color: #c9a84c;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .music-sub {
            font-size: 0.6rem;
            color: #555;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 70px;
            height: 2px;
            background: rgba(201, 168, 76, 0.2);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            background: #c9a84c;
            border-radius: 50%;
            cursor: pointer;
        }

        .volume-icon {
            color: #555;
            font-size: 0.9rem;
        }

        .music-equalizer {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 16px;
        }

        .eq-bar {
            width: 3px;
            background: #c9a84c;
            border-radius: 2px;
            animation: eq 0.8s ease-in-out infinite alternate;
        }

        .eq-bar:nth-child(1) { height: 6px;  animation-delay: 0s; }
        .eq-bar:nth-child(2) { height: 12px; animation-delay: 0.2s; }
        .eq-bar:nth-child(3) { height: 8px;  animation-delay: 0.4s; }
        .eq-bar:nth-child(4) { height: 14px; animation-delay: 0.1s; }

        @keyframes eq {
            from { transform: scaleY(0.3); }
            to   { transform: scaleY(1); }
        }

        .music-equalizer.paused .eq-bar {
            animation-play-state: paused;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            z-index: 1;
        }

        .header .et {
            color: #c9a84c;
            font-size: 1rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header h1 {
            font-size: 3.5rem;
            font-weight: normal;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #c9a84c, #f5e6c8, #c9a84c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header .date {
            color: #888;
            font-size: 0.85rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .header .date i {
            color: #c9a84c;
            font-size: 1rem;
            -webkit-text-fill-color: #c9a84c;
        }

        .countdown {
            display: flex;
            gap: 20px;
            margin-bottom: 60px;
            z-index: 1;
            flex-wrap: wrap;
            justify-content: center;
        }

        .countdown-item {
            text-align: center;
            background: rgba(201, 168, 76, 0.05);
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 12px;
            padding: 20px 25px;
            min-width: 80px;
        }

        .countdown-item span {
            display: block;
            font-size: 2.5rem;
            color: #c9a84c;
            font-weight: bold;
        }

        .countdown-item p {
            font-size: 0.65rem;
            color: #666;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .todo-section {
            z-index: 1;
            width: 100%;
            max-width: 700px;
        }

        .todo-section h2 {
            text-align: center;
            font-size: 1.2rem;
            font-weight: normal;
            color: #c9a84c;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid rgba(201, 168, 76, 0.2);
            color: #666;
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s;
            font-family: inherit;
        }

        .filter-btn.active,
        .filter-btn:hover {
            border-color: #c9a84c;
            color: #c9a84c;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 25px;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 14px 16px;
            transition: all 0.3s;
        }

        .task-item:hover {
            border-color: rgba(201, 168, 76, 0.2);
        }

        .task-item.done {
            opacity: 0.4;
        }

        .custom-checkbox {
            width: 22px;
            height: 22px;
            border: 1px solid rgba(201, 168, 76, 0.4);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s;
        }

        .custom-checkbox.checked {
            background: rgba(201, 168, 76, 0.2);
            border-color: #c9a84c;
        }

        .custom-checkbox i {
            color: #c9a84c;
            font-size: 0.9rem;
        }

        .task-info {
            flex: 1;
        }

        .task-text {
            font-size: 0.95rem;
            color: #e0e0e0;
            margin-bottom: 4px;
        }

        .task-item.done .task-text {
            text-decoration: line-through;
            color: #555;
        }

        .task-category {
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .cat-venue    { color: #9b8ec4; }
        .cat-tenues   { color: #c4958e; }
        .cat-traiteur { color: #8ec4a0; }
        .cat-deco     { color: #c4bc8e; }
        .cat-musique  { color: #8eafc4; }
        .cat-admin    { color: #c4a88e; }
        .cat-autre    { color: #888; }

        .delete-btn {
            background: transparent;
            border: none;
            color: #333;
            cursor: pointer;
            padding: 4px;
            transition: color 0.3s;
            font-size: 1rem;
        }

        .delete-btn:hover {
            color: #c9a84c;
        }

        .add-task {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .add-task input {
            flex: 1;
            min-width: 200px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 10px;
            padding: 12px 16px;
            color: #f5f5f5;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .add-task input:focus {
            border-color: rgba(201, 168, 76, 0.5);
        }

        .add-task input::placeholder {
            color: #444;
        }

        .add-task select {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 10px;
            padding: 12px 16px;
            color: #888;
            font-family: inherit;
            font-size: 0.8rem;
            outline: none;
            cursor: pointer;
        }

        .add-task select option {
            background: #1a1a1a;
        }

        .add-task button {
            background: rgba(201, 168, 76, 0.1);
            border: 1px solid rgba(201, 168, 76, 0.3);
            border-radius: 10px;
            padding: 12px 20px;
            color: #c9a84c;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.3s;
        }

        .add-task button:hover {
            background: rgba(201, 168, 76, 0.2);
        }

        .progress-bar {
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, #c9a84c, #f5e6c8);
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        .progress-text {
            text-align: center;
            font-size: 0.7rem;
            color: #555;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .photo-section {
            z-index: 1;
            text-align: center;
            margin-top: 60px;
            margin-bottom: 80px;
            width: 100%;
        }

        .gold-line {
            width: 100px;
            height: 1px;
            background: linear-gradient(to right, transparent, #c9a84c, transparent);
            margin: 0 auto 30px auto;
        }

        .photo-label {
            color: #c9a84c;
            letter-spacing: 5px;
            font-size: 0.85rem;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .photo-frame {
            border: 1px solid rgba(201, 168, 76, 0.3);
            border-radius: 16px;
            overflow: hidden;
            max-width: 350px;
            margin: 0 auto;
            box-shadow: 0 0 40px rgba(201, 168, 76, 0.1);
        }

        .photo-frame img {
            width: 100%;
            display: block;
        }

        @media (max-width: 600px) {
            .header h1           { font-size: 2.2rem; }
            .countdown-item span { font-size: 1.8rem; }
            .countdown-item      { padding: 15px 18px; min-width: 65px; }
            .add-task            { flex-wrap: wrap; }
            .add-task select     { width: 100%; }
            .music-player        { bottom: 15px; right: 15px; padding: 8px 12px; gap: 8px; }
            .volume-slider       { width: 50px; }
            .music-info          { display: none; }
        }

        @media (max-width: 480px) {
            .photo-frame {
                max-width: 260px;
                border-radius: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="particles" id="particles"></div>

    <!-- LECTEUR MUSICAL -->
    <div class="music-player">
        <button class="play-btn" id="playBtn" onclick="toggleMusic()">
            <i class="ph ph-play" id="playIcon"></i>
        </button>
        <div class="music-info">
            <span class="music-title">Notre chanson</span>
            <span class="music-sub">Mélina & Jordan</span>
        </div>
        <div class="music-equalizer paused" id="equalizer">
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
        </div>
        <i class="ph ph-speaker-simple-low volume-icon"></i>
        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.5" oninput="setVolume(this.value)" />
    </div>

    <audio id="audio" loop>
        <source src="musique.mp3" type="audio/mpeg">
    </audio>

    <div class="header">
        <div class="et">✦ &nbsp; Mariage &nbsp; ✦</div>
        <h1>Mélina & Jordan</h1>
        <div class="date">
            <i class="ph ph-calendar-blank"></i>
            29 Août 2026
        </div>
    </div>

    <div class="countdown">
        <div class="countdown-item"><span id="days">00</span><p>Jours</p></div>
        <div class="countdown-item"><span id="hours">00</span><p>Heures</p></div>
        <div class="countdown-item"><span id="minutes">00</span><p>Minutes</p></div>
        <div class="countdown-item"><span id="seconds">00</span><p>Secondes</p></div>
    </div>

    <div class="todo-section">
        <h2><i class="ph ph-list-checks"></i> À organiser</h2>

        <div class="progress-text" id="progressText">0 tâche complétée</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

        <div class="filters">
            <button class="filter-btn active" onclick="filterTasks('all', this)">Tout</button>
            <button class="filter-btn" onclick="filterTasks('venue', this)">Lieu</button>
            <button class="filter-btn" onclick="filterTasks('tenues', this)">Tenues</button>
            <button class="filter-btn" onclick="filterTasks('traiteur', this)">Traiteur</button>
            <button class="filter-btn" onclick="filterTasks('deco', this)">Déco</button>
            <button class="filter-btn" onclick="filterTasks('musique', this)">Musique</button>
            <button class="filter-btn" onclick="filterTasks('admin', this)">Administratif</button>
            <button class="filter-btn" onclick="filterTasks('autre', this)">Autre</button>
        </div>

        <div class="task-list" id="taskList"></div>

        <div class="add-task">
            <input type="text" id="taskInput" placeholder="Ajouter une tâche..." />
            <select id="categorySelect">
                <option value="venue">Lieu</option>
                <option value="tenues">Tenues</option>
                <option value="traiteur">Traiteur</option>
                <option value="deco">Déco</option>
                <option value="musique">Musique</option>
                <option value="admin">Administratif</option>
                <option value="autre">Autre</option>
            </select>
            <button onclick="addTask()"><i class="ph ph-plus"></i></button>
        </div>
    </div>

    <div class="photo-section">
        <div class="gold-line"></div>
        <p class="photo-label"><i class="ph ph-heart"></i> &nbsp; Mélina & Jordan &nbsp; <i class="ph ph-heart"></i></p>
        <div class="photo-frame">
            <img src="photo.jpeg" alt="Mélina & Jordan" />
        </div>
    </div>

    <script>
        // ── MUSIQUE ──────────────────────────────────────────────
        const audio     = document.getElementById('audio');
        const playIcon  = document.getElementById('playIcon');
        const equalizer = document.getElementById('equalizer');
        let isPlaying   = false;

        audio.volume = 0.5;

        function toggleMusic() {
            if (isPlaying) {
                audio.pause();
                playIcon.className = 'ph ph-play';
                equalizer.classList.add('paused');
            } else {
                audio.play();
                playIcon.className = 'ph ph-pause';
                equalizer.classList.remove('paused');
            }
            isPlaying = !isPlaying;
        }

        function setVolume(val) {
            audio.volume = val;
        }

        // ── TÂCHES ───────────────────────────────────────────────
        const categories = {
            venue:    { label: 'Lieu',          icon: 'ph-map-pin'    },
            tenues:   { label: 'Tenues',        icon: 'ph-dress'      },
            traiteur: { label: 'Traiteur',      icon: 'ph-fork-knife' },
            deco:     { label: 'Déco',          icon: 'ph-flower'     },
            musique:  { label: 'Musique',       icon: 'ph-music-note' },
            admin:    { label: 'Administratif', icon: 'ph-file-text'  },
            autre:    { label: 'Autre',         icon: 'ph-tag'        },
        };

        let tasks         = JSON.parse(localStorage.getItem('weddingTasks') || '[]');
        let currentFilter = 'all';

        function saveTasks() {
            localStorage.setItem('weddingTasks', JSON.stringify(tasks));
        }

        function renderTasks() {
            const list     = document.getElementById('taskList');
            const filtered = currentFilter === 'all' ? tasks : tasks.filter(t => t.category === currentFilter);
            const done     = tasks.filter(t => t.done).length;
            const total    = tasks.length;
            const pct      = total ? Math.round((done / total) * 100) : 0;

            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('progressText').textContent =
                total === 0 ? 'Aucune tâche' :
                `${done} / ${total} tâche${total > 1 ? 's' : ''} complétée${done > 1 ? 's' : ''}`;

            if (filtered.length === 0) {
                list.innerHTML = '<p style="text-align:center;color:#333;font-size:0.85rem;letter-spacing:2px;padding:30px 0">Aucune tâche</p>';
                return;
            }

            list.innerHTML = filtered.map(task => {
                const cat = categories[task.category];
                return `
                <div class="task-item ${task.done ? 'done' : ''}">
                    <div class="custom-checkbox ${task.done ? 'checked' : ''}" onclick="toggleTask(${task.id})">
                        ${task.done ? '<i class="ph ph-check"></i>' : ''}
                    </div>
                    <div class="task-info">
                        <div class="task-text">${task.text}</div>
                        <span class="task-category cat-${task.category}">
                            <i class="ph ${cat.icon}"></i> ${cat.label}
                        </span>
                    </div>
                    <button class="delete-btn" onclick="deleteTask(${task.id})">
                        <i class="ph ph-trash"></i>
                    </button>
                </div>`;
            }).join('');
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            const text  = input.value.trim();
            if (!text) return;
            tasks.push({
                id:       Date.now(),
                text:     text,
                category: document.getElementById('categorySelect').value,
                done:     false
            });
            input.value = '';
            saveTasks();
            renderTasks();
        }

        document.getElementById('taskInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') addTask();
        });

        function toggleTask(id) {
            const t = tasks.find(t => t.id === id);
            if (t) { t.done = !t.done; saveTasks(); renderTasks(); }
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
            renderTasks();
        }

        function filterTasks(cat, btn) {
            currentFilter = cat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderTasks();
        }

        // ── COMPTE À REBOURS ─────────────────────────────────────
        function updateCountdown() {
            const target = new Date('2026-08-29T00:00:00');
            const now    = new Date();
            const diff   = target - now;

            if (diff <= 0) {
                document.querySelector('.countdown').innerHTML =
                    '<p style="color:#c9a84c;font-size:1.5rem;letter-spacing:3px">✦ C\'est le grand jour ! ✦</p>';
                return;
            }

            const days    = Math.floor(diff / 86400000);
            const hours   = Math.floor((diff % 86400000) / 3600000);
            const minutes = Math.floor((diff % 3600000)  / 60000);
            const seconds = Math.floor((diff % 60000)    / 1000);

            document.getElementById('days').textContent    = String(days).padStart(2, '0');
            document.getElementById('hours').textContent   = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);

        // ── PARTICULES ───────────────────────────────────────────
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.style.left              = Math.random() * 100 + '%';
                p.style.animationDuration = (Math.random() * 15 + 10) + 's';
                p.style.animationDelay    = (Math.random() * 10) + 's';
                if (Math.random() > 0.7) p.style.background = '#fff';
                container.appendChild(p);
            }
        }

        createParticles();
        renderTasks();
    </script>
</body>
</html>
