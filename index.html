<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mélina & Jordan — 29 Août 2026</title>
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #f5f5f5;
            font-family: 'Century Gothic', 'Futura', 'Trebuchet MS', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #c9a84c;
            border-radius: 50%;
            animation: float linear infinite;
            opacity: 0;
        }

        @keyframes float {
            0%   { transform: translateY(100vh); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            z-index: 1;
        }

        .header .et {
            color: #c9a84c;
            font-size: 1rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header h1 {
            font-size: 3.5rem;
            font-weight: normal;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #c9a84c, #f5e6c8, #c9a84c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header .date {
            color: #888;
            font-size: 0.85rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .header .date i {
            color: #c9a84c;
            font-size: 1rem;
            -webkit-text-fill-color: #c9a84c;
        }

        .countdown {
            display: flex;
            gap: 20px;
            margin-bottom: 60px;
            z-index: 1;
            flex-wrap: wrap;
            justify-content: center;
        }

        .countdown-item {
            text-align: center;
            background: rgba(201, 168, 76, 0.05);
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 12px;
            padding: 20px 25px;
            min-width: 80px;
        }

        .countdown-item span {
            display: block;
            font-size: 2.5rem;
            color: #c9a84c;
            font-weight: bold;
        }

        .countdown-item p {
            font-size: 0.65rem;
            color: #666;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .todo-section {
            z-index: 1;
            width: 100%;
            max-width: 700px;
        }

        .todo-section h2 {
            text-align: center;
            font-size: 1.2rem;
            font-weight: normal;
            color: #c9a84c;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .progress-container {
            background: rgba(255,255,255,0.05);
            border-radius: 50px;
            height: 8px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #c9a84c, #f5e6c8);
            border-radius: 50px;
            transition: width 0.5s ease;
        }

        .progress-text {
            text-align: right;
            font-size: 0.75rem;
            color: #666;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .add-task {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .add-task input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(201, 168, 76, 0.3);
            border-radius: 10px;
            padding: 14px 18px;
            color: #f5f5f5;
            font-size: 0.9rem;
            font-family: 'Century Gothic', 'Futura', 'Trebuchet MS', sans-serif;
            outline: none;
            transition: border 0.3s;
            letter-spacing: 0.5px;
        }

        .add-task input:focus {
            border-color: #c9a84c;
        }

        .add-task input::placeholder {
            color: #444;
        }

        .add-task select {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(201, 168, 76, 0.3);
            border-radius: 10px;
            padding: 14px 12px;
            color: #f5f5f5;
            font-size: 0.82rem;
            font-family: 'Century Gothic', 'Futura', 'Trebuchet MS', sans-serif;
            outline: none;
            cursor: pointer;
        }

        .add-task select option {
            background: #1a1a1a;
        }

        .add-task button {
            background: linear-gradient(135deg, #c9a84c, #f5e6c8);
            border: none;
            border-radius: 10px;
            padding: 14px 20px;
            color: #0a0a0a;
            font-size: 1.3rem;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .add-task button:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid rgba(201, 168, 76, 0.3);
            border-radius: 50px;
            padding: 6px 16px;
            color: #888;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Century Gothic', 'Futura', 'Trebuchet MS', sans-serif;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .filter-btn i { font-size: 0.9rem; }

        .filter-btn.active,
        .filter-btn:hover {
            background: rgba(201, 168, 76, 0.15);
            border-color: #c9a84c;
            color: #c9a84c;
        }

        .todo-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .todo-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .todo-item:hover {
            background: rgba(201, 168, 76, 0.05);
            border-color: rgba(201, 168, 76, 0.2);
        }

        .todo-item.done { opacity: 0.4; }
        .todo-item.done .task-text {
            text-decoration: line-through;
            color: #555;
        }

        .custom-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid rgba(201, 168, 76, 0.4);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s;
        }

        .custom-checkbox.checked {
            background: linear-gradient(135deg, #c9a84c, #f5e6c8);
            border-color: #c9a84c;
        }

        .custom-checkbox.checked i {
            color: #0a0a0a;
            font-size: 0.85rem;
        }

        .task-info { flex: 1; }

        .task-text {
            font-size: 0.9rem;
            color: #f0f0f0;
            margin-bottom: 5px;
            letter-spacing: 0.3px;
        }

        .task-category {
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            letter-spacing: 0.5px;
        }

        .task-category i { font-size: 0.8rem; }

        .cat-lieu    { background: rgba(100,149,237,0.15); color: #6495ed; }
        .cat-tenue   { background: rgba(255,182,193,0.15); color: #ffb6c1; }
        .cat-repas   { background: rgba(144,238,144,0.15); color: #90ee90; }
        .cat-deco    { background: rgba(255,215,0,0.15);   color: #ffd700; }
        .cat-invites { background: rgba(221,160,221,0.15); color: #dda0dd; }
        .cat-autre   { background: rgba(255,255,255,0.08); color: #aaa;    }

        .delete-btn {
            background: transparent;
            border: none;
            color: #333;
            font-size: 1.1rem;
            cursor: pointer;
            transition: color 0.3s;
            padding: 4px;
            display: flex;
            align-items: center;
        }

        .delete-btn:hover { color: #e74c3c; }

        .empty-msg {
            text-align: center;
            color: #444;
            font-size: 0.85rem;
            padding: 40px;
            letter-spacing: 3px;
        }

        @media (max-width: 600px) {
            .header h1       { font-size: 2.2rem; }
            .countdown-item span { font-size: 1.8rem; }
            .countdown-item  { padding: 15px 18px; min-width: 65px; }
            .add-task        { flex-wrap: wrap; }
            .add-task select { width: 100%; }

            .photo-section {
    z-index: 1;
    text-align: center;
    margin-top: 60px;
    margin-bottom: 40px;
}
@media (max-width: 480px) {
    .photo-frame {
        max-width: 280px;
        border-radius: 12px;
    }
}

.gold-line {
    width: 100px;
    height: 1px;
    background: linear-gradient(to right, transparent, #c9a84c, transparent);
    margin: 0 auto 30px auto;
}

.photo-label {
    color: #c9a84c;
    letter-spacing: 5px;
    font-size: 0.85rem;
    text-transform: uppercase;
    margin-bottom: 20px;
}

.photo-frame {
    border: 1px solid rgba(201, 168, 76, 0.3);
    border-radius: 16px;
    overflow: hidden;
    max-width: 350px;
    margin: 0 auto;
    box-shadow: 0 0 40px rgba(201, 168, 76, 0.1);
}

.photo-frame img {
    width: 100%;
    display: block;
}

        }
    </style>
</head>
<body>

    <div class="particles" id="particles"></div>

    <div class="header">
        <p class="et"><i class="ph ph-sparkle"></i> Le Mariage de <i class="ph ph-sparkle"></i></p>
        <h1>Mélina & Jordan</h1>
        <p class="date"><i class="ph ph-calendar-heart"></i> 29 Août 2026</p>
    </div>

    <div class="countdown">
        <div class="countdown-item">
            <span id="days">--</span>
            <p>Jours</p>
        </div>
        <div class="countdown-item">
            <span id="hours">--</span>
            <p>Heures</p>
        </div>
        <div class="countdown-item">
            <span id="minutes">--</span>
            <p>Minutes</p>
        </div>
        <div class="countdown-item">
            <span id="seconds">--</span>
            <p>Secondes</p>
        </div>
    </div>

    <div class="todo-section">
        <h2><i class="ph ph-check-square"></i> Préparatifs <i class="ph ph-check-square"></i></h2>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar" style="width: 0%"></div>
        </div>
        <div class="progress-text" id="progressText">0 / 0 tâches complétées</div>

        <div class="add-task">
            <input type="text" id="taskInput" placeholder="Ajouter une tâche..." />
            <select id="categorySelect">
                <option value="lieu">📍 Lieu</option>
                <option value="tenue">👗 Tenue</option>
                <option value="repas">🍽 Repas</option>
                <option value="deco">🌸 Déco</option>
                <option value="invites">💌 Invités</option>
                <option value="autre">✦ Autre</option>
            </select>
            <button onclick="addTask()"><i class="ph ph-plus"></i></button>
        </div>

        <div class="filters">
            <button class="filter-btn active" onclick="filterTasks('all', this)">
                <i class="ph ph-squares-four"></i> Tout
            </button>
            <button class="filter-btn" onclick="filterTasks('lieu', this)">
                <i class="ph ph-map-pin"></i> Lieu
            </button>
            <button class="filter-btn" onclick="filterTasks('tenue', this)">
                <i class="ph ph-dress"></i> Tenue
            </button>
            <button class="filter-btn" onclick="filterTasks('repas', this)">
                <i class="ph ph-fork-knife"></i> Repas
            </button>
            <button class="filter-btn" onclick="filterTasks('deco', this)">
                <i class="ph ph-flower"></i> Déco
            </button>
            <button class="filter-btn" onclick="filterTasks('invites', this)">
                <i class="ph ph-envelope"></i> Invités
            </button>
            <button class="filter-btn" onclick="filterTasks('autre', this)">
                <i class="ph ph-star"></i> Autre
            </button>
        </div>

        <div class="todo-list" id="todoList"></div>
    </div>

    <script>
        const CATEGORIES = {
            lieu:    { label: 'Lieu',    icon: 'ph-map-pin'    },
            tenue:   { label: 'Tenue',   icon: 'ph-dress'      },
            repas:   { label: 'Repas',   icon: 'ph-fork-knife' },
            deco:    { label: 'Déco',    icon: 'ph-flower'     },
            invites: { label: 'Invités', icon: 'ph-envelope'   },
            autre:   { label: 'Autre',   icon: 'ph-star'       },
        };

        let tasks         = JSON.parse(localStorage.getItem('weddingTasks') || '[]');
        let currentFilter = 'all';

        function saveTasks() {
            localStorage.setItem('weddingTasks', JSON.stringify(tasks));
        }

        function renderTasks() {
            const list    = document.getElementById('todoList');
            const visible = currentFilter === 'all'
                ? tasks
                : tasks.filter(t => t.category === currentFilter);

            const done  = tasks.filter(t => t.done).length;
            const total = tasks.length;
            const pct   = total === 0 ? 0 : Math.round((done / total) * 100);

            document.getElementById('progressBar').style.width = pct + '%';
            document.getElementById('progressText').textContent =
                `${done} / ${total} tâche${total > 1 ? 's' : ''} complétée${done > 1 ? 's' : ''}`;

            if (visible.length === 0) {
                list.innerHTML = '<p class="empty-msg">✦ &nbsp; Aucune tâche &nbsp; ✦</p>';
                return;
            }

            list.innerHTML = visible.map(task => {
                const cat  = CATEGORIES[task.category] || CATEGORIES.autre;
                const done = task.done ? 'done' : '';
                const chk  = task.done ? 'checked' : '';
                return `
                <div class="todo-item ${done}" id="task-${task.id}">
                    <div class="custom-checkbox ${chk}" onclick="toggleTask(${task.id})">
                        ${task.done ? '<i class="ph ph-check"></i>' : ''}
                    </div>
                    <div class="task-info">
                        <div class="task-text">${task.text}</div>
                        <span class="task-category cat-${task.category}">
                            <i class="ph ${cat.icon}"></i> ${cat.label}
                        </span>
                    </div>
                    <button class="delete-btn" onclick="deleteTask(${task.id})">
                        <i class="ph ph-trash"></i>
                    </button>
                </div>`;
            }).join('');
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            const text  = input.value.trim();
            if (!text) return;

            tasks.push({
                id:       Date.now(),
                text:     text,
                category: document.getElementById('categorySelect').value,
                done:     false
            });

            input.value = '';
            saveTasks();
            renderTasks();
        }

        document.getElementById('taskInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') addTask();
        });

        function toggleTask(id) {
            const t = tasks.find(t => t.id === id);
            if (t) { t.done = !t.done; saveTasks(); renderTasks(); }
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
            renderTasks();
        }

        function filterTasks(cat, btn) {
            currentFilter = cat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderTasks();
        }

        function updateCountdown() {
            const target = new Date('2026-08-29T00:00:00');
            const now    = new Date();
            const diff   = target - now;

            if (diff <= 0) {
                document.querySelector('.countdown').innerHTML =
                    '<p style="color:#c9a84c;font-size:1.5rem;letter-spacing:3px">✦ C\'est le grand jour ! ✦</p>';
                return;
            }

            const days    = Math.floor(diff / 86400000);
            const hours   = Math.floor((diff % 86400000) / 3600000);
            const minutes = Math.floor((diff % 3600000)  / 60000);
            const seconds = Math.floor((diff % 60000)    / 1000);

            document.getElementById('days').textContent    = String(days).padStart(2, '0');
            document.getElementById('hours').textContent   = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);

        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.style.left              = Math.random() * 100 + '%';
                p.style.animationDuration = (Math.random() * 15 + 10) + 's';
                p.style.animationDelay    = (Math.random() * 10) + 's';
                if (Math.random() > 0.7) p.style.background = '#fff';
                container.appendChild(p);
            }
        }

        createParticles();
        renderTasks();
    </script>
    
    <div class="photo-section">
    <div class="gold-line"></div>
    <p class="photo-label"><i class="ph ph-heart"></i> Mélina & Jordan <i class="ph ph-heart"></i></p>
    <div class="photo-frame">
        <img src="photo.jpeg" alt="Mélina & Jordan" />
    </div>
</div>


</body>
</html>
