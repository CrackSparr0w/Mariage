<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mélina & Jordan — 29 Août 2026</title>
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #f5f5f5;
            font-family: 'Century Gothic', 'Futura', 'Trebuchet MS', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* Particules */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #c9a84c;
            border-radius: 50%;
            animation: float linear infinite;
            opacity: 0;
        }

        @keyframes float {
            0%   { transform: translateY(100vh); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 50px;
            z-index: 1;
        }

        /* ── STYLES INVERSÉS ── */
        .header .et {
            font-size: 3.5rem;
            font-weight: normal;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #c9a84c, #f5e6c8, #c9a84c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header .et i {
            font-size: 2rem;
            -webkit-text-fill-color: #c9a84c;
        }

        .header h1 {
            font-size: 1rem;
            font-weight: normal;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #888;
            background: none;
            -webkit-background-clip: unset;
            -webkit-text-fill-color: #888;
        }

        .header .date {
            color: #888;
            font-size: 0.85rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .header .date i {
            color: #c9a84c;
            font-size: 1rem;
            -webkit-text-fill-color: #c9a84c;
        }

        /* Lecteur musical */
        .music-player {
            z-index: 1;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(201, 168, 76, 0.05);
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 50px;
            padding: 12px 24px;
        }

        .music-btn {
            background: linear-gradient(135deg, #c9a84c, #f5e6c8);
            border: none;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .music-btn:hover { transform: scale(1.1); }
        .music-btn i { color: #0a0a0a; font-size: 1.1rem; }

        .music-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .music-title { font-size: 0.8rem; color: #c9a84c; letter-spacing: 2px; }
        .music-sub   { font-size: 0.7rem; color: #555;    letter-spacing: 1px; }

        .music-bars {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 20px;
        }

        .music-bars span {
            display: block;
            width: 3px;
            background: #c9a84c;
            border-radius: 2px;
            animation: bar 1s ease-in-out infinite alternate;
        }

        .music-bars span:nth-child(1) { height: 8px;  animation-delay: 0s; }
        .music-bars span:nth-child(2) { height: 16px; animation-delay: 0.2s; }
        .music-bars span:nth-child(3) { height: 10px; animation-delay: 0.4s; }
        .music-bars span:nth-child(4) { height: 20px; animation-delay: 0.1s; }
        .music-bars span:nth-child(5) { height: 6px;  animation-delay: 0.3s; }

        @keyframes bar {
            from { transform: scaleY(0.4); opacity: 0.6; }
            to   { transform: scaleY(1);   opacity: 1; }
        }

        .music-bars.paused span { animation-play-state: paused; }

        /* Compte à rebours */
        .countdown {
            display: flex;
            gap: 30px;
            margin-bottom: 60px;
            z-index: 1;
        }

        .countdown-item {
            text-align: center;
            background: rgba(201, 168, 76, 0.05);
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 12px;
            padding: 20px 25px;
            min-width: 80px;
        }

        .countdown-item span {
            display: block;
            font-size: 2.5rem;
            color: #c9a84c;
            font-weight: bold;
        }

        .countdown-item p {
            font-size: 0.65rem;
            color: #666;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        /* Section Todo */
        .todo-section {
            z-index: 1;
            width: 100%;
            max-width: 700px;
        }

        .todo-section h2 {
            text-align: center;
            font-size: 1.2rem;
            font-weight: normal;
            color: #c9a84c;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .todo-section h2 i { font-size: 1.3rem; }

        /* Barre de progression */
        .progress-container {
            background: rgba(255,255,255,0.05);
            border-radius: 50px;
            height: 8px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #c9a84c, #f5e6c8);
            border-radius: 50px;
            transition: width 0.5s ease;
        }

        .progress-text {
            text-align: right;
            font-size: 0.75rem;
            color: #666;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        /* Ajouter une tâche */
        .add-task {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .add-task input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(201, 168, 76, 0.3);
            border-radius: 10px;
            padding: 14px 18px;
            color: #f5f5f5;
            font-size: 0.9rem;
            font-family: 'Century Gothic', 'Futura', 'Trebuchet MS', sans-serif;
            outline: none;
            transition: border 0.3s;
            letter-spacing: 0.5px;
        }

        .add-task input:focus  { border-color: #c9a84c; }
        .add-task input::placeholder { color: #444; }

        .add-task select {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(201, 168, 76, 0.3);
            border-radius: 10px;
            padding: 14px 12px;
            color: #f5f5f5;
            font-size: 0.82rem;
            font-family: 'Century Gothic', 'Futura', 'Trebuchet MS', sans-serif;
            outline: none;
            cursor: pointer;
        }

        .add-task select option { background: #1a1a1a; }

        .add-task button {
            background: linear-gradient(135deg, #c9a84c, #f5e6c8);
            border: none;
            border-radius: 10px;
            padding: 14px 20px;
            color: #0a0a0a;
            font-size: 1.3rem;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .add-task button:hover { transform: scale(1.05); opacity: 0.9; }

        /* Filtres */
        .filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid rgba(201, 168, 76, 0.3);
            border-radius: 50px;
            padding: 6px 16px;
            color: #888;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Century Gothic', 'Futura', 'Trebuchet MS', sans-serif;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .filter-btn i { font-size: 0.9rem; }

        .filter-btn.active,
        .filter-btn:hover {
            background: rgba(201, 168, 76, 0.15);
            border-color: #c9a84c;
            color: #c9a84c;
        }

        /* Liste des tâches */
        .todo-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .todo-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .todo-item:hover {
            background: rgba(201, 168, 76, 0.05);
            border-color: rgba(201, 168, 76, 0.2);
        }

        .todo-item.done { opacity: 0.4; }
        .todo-item.done .task-text { text-decoration: line-through; color: #555; }

        /* Checkbox */
        .custom-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid rgba(201, 168, 76, 0.4);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s;
        }

        .custom-checkbox.checked {
            background: linear-gradient(135deg, #c9a84c, #f5e6c8);
            border-color: #c9a84c;
        }

        .custom-checkbox.checked i { color: #0a0a0a; font-size: 0.85rem; }

        .task-info  { flex: 1; }
        .task-text  { font-size: 0.9rem; color: #f0f0f0; margin-bottom: 5px; letter-spacing: 0.3px; }

        .task-category {
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            letter-spacing: 0.5px;
        }

        .task-category i { font-size: 0.8rem; }

        .cat-lieu    { background: rgba(100,149,237,0.15); color: #6495ed; }
        .cat-tenue   { background: rgba(255,182,193,0.15); color: #ffb6c1; }
        .cat-repas   { background: rgba(144,238,144,0.15); color: #90ee90; }
        .cat-deco    { background: rgba(255,215,0,0.15);   color: #ffd700; }
        .cat-invites { background: rgba(221,160,221,0.15); color: #dda0dd; }
        .cat-autre   { background: rgba(255,255,255,0.08); color: #aaa; }

        .delete-btn {
            background: transparent;
            border: none;
            color: #333;
            font-size: 1.1rem;
            cursor: pointer;
            transition: color 0.3s;
            padding: 4px;
            display: flex;
            align-items: center;
        }

        .delete-btn:hover { color: #e74c3c; }

        .empty-msg {
            text-align: center;
            color: #444;
            font-size: 0.85rem;
            padding: 40px;
            letter-spacing: 3px;
        }

        /* Photo bas de page */
        .photo-section {
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 60px;
            gap: 16px;
            width: 100%;
            max-width: 500px;
        }

        .gold-line {
            width: 120px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #c9a84c, transparent);
        }

        .photo-label {
            color: #c9a84c;
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .photo-frame {
            border: 1px solid rgba(201, 168, 76, 0.3);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(201, 168, 76, 0.15);
            width: 100%;
        }

        .photo-frame img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.5s ease;
        }

        .photo-frame img:hover { transform: scale(1.02); }

        /* Responsive */
        @media (max-width: 600px) {
            .header .et     { font-size: 2.2rem; }
            .header h1      { font-size: 0.85rem; }
            .countdown      { gap: 12px; }
            .countdown-item { padding: 15px; min-width: 65px; }
            .countdown-item span { font-size: 1.8rem; }
            .add-task       { flex-wrap: wrap; }
            .add-task select{ width: 100%; }
            .photo-section  { max-width: 100%; }
        }
    </style>
</head>
<body>

    <!-- Particules -->
    <div class="particles" id="particles"></div>

    <!-- Audio -->
    <audio id="bgMusic" loop>
        <source src="musique.mp3" type="audio/mpeg">
    </audio>

    <!-- Header -->
    <div class="header">
        <div class="et">
            <i class="ph ph-shooting-star"></i>
            Mélina &amp; Jordan
            <i class="ph ph-shooting-star"></i>
        </div>
        <h1>Notre Mariage</h1>
        <div class="date">
            <i class="ph ph-calendar-blank"></i>
            29 Août 2026
            <i class="ph ph-map-pin"></i>
            France
        </div>
    </div>

    <!-- Lecteur musical -->
    <div class="music-player">
        <button class="music-btn" id="musicBtn" onclick="toggleMusic()">
            <i class="ph ph-play" id="musicIcon"></i>
        </button>
        <div class="music-info">
            <div class="music-title">♪ Notre Chanson</div>
            <div class="music-sub">Mélina & Jordan</div>
        </div>
        <div class="music-bars paused" id="musicBars">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <!-- Compte à rebours -->
    <div class="countdown">
        <div class="countdown-item">
            <span id="days">00</span>
            <p>Jours</p>
        </div>
        <div class="countdown-item">
            <span id="hours">00</span>
            <p>Heures</p>
        </div>
        <div class="countdown-item">
            <span id="minutes">00</span>
            <p>Minutes</p>
        </div>
        <div class="countdown-item">
            <span id="seconds">00</span>
            <p>Secondes</p>
        </div>
    </div>

    <!-- Todo -->
    <div class="todo-section">
        <h2>
            <i class="ph ph-check-square"></i>
            Liste des tâches
        </h2>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar" style="width: 0%"></div>
        </div>
        <div class="progress-text" id="progressText">0 / 0 tâches complétées</div>

        <div class="add-task">
            <input type="text" id="taskInput" placeholder="Nouvelle tâche..." />
            <select id="categorySelect">
                <option value="lieu">📍 Lieu</option>
                <option value="tenue">👗 Tenues</option>
                <option value="repas">🍽️ Traiteur</option>
                <option value="deco">✨ Déco</option>
                <option value="invites">💌 Invités</option>
                <option value="autre">📌 Autre</option>
            </select>
            <button onclick="addTask()">
                <i class="ph ph-plus"></i>
            </button>
        </div>

        <div class="filters">
            <button class="filter-btn active" onclick="filterTasks('all', this)">
                <i class="ph ph-squares-four"></i> Tout
            </button>
            <button class="filter-btn" onclick="filterTasks('lieu', this)">
                <i class="ph ph-map-pin"></i> Lieu
            </button>
            <button class="filter-btn" onclick="filterTasks('tenue', this)">
                <i class="ph ph-dress"></i> Tenues
            </button>
            <button class="filter-btn" onclick="filterTasks('repas', this)">
                <i class="ph ph-fork-knife"></i> Traiteur
            </button>
            <button class="filter-btn" onclick="filterTasks('deco', this)">
                <i class="ph ph-sparkle"></i> Déco
            </button>
            <button class="filter-btn" onclick="filterTasks('invites', this)">
                <i class="ph ph-envelope"></i> Invités
            </button>
            <button class="filter-btn" onclick="filterTasks('autre', this)">
                <i class="ph ph-push-pin"></i> Autre
            </button>
        </div>

        <div class="todo-list" id="todoList"></div>
    </div>

    <!-- Photo — bas de page -->
    <div class="photo-section">
        <div class="gold-line"></div>
        <p class="photo-label">
            <i class="ph ph-heart"></i>
            Mélina &amp; Jordan
            <i class="ph ph-heart"></i>
        </p>
        <div class="photo-frame">
            <img src="photo.jpeg" alt="Mélina & Jordan" />
        </div>
        <div class="gold-line"></div>
    </div>

    <script>
        // ── MUSIQUE ───────────────────────────────────────────────
        const audio     = document.getElementById('bgMusic');
        const musicIcon = document.getElementById('musicIcon');
        const musicBars = document.getElementById('musicBars');
        let   isPlaying = false;

        function toggleMusic() {
            if (isPlaying) {
                audio.pause();
                musicIcon.className = 'ph ph-play';
                musicBars.classList.add('paused');
            } else {
                audio.play();
                musicIcon.className = 'ph ph-pause';
                musicBars.classList.remove('paused');
            }
            isPlaying = !isPlaying;
        }

        // ── DONNÉES ───────────────────────────────────────────────
        const categories = {
            lieu:    { label: 'Lieu',     icon: 'ph-map-pin',    css: 'cat-lieu'    },
            tenue:   { label: 'Tenues',   icon: 'ph-dress',      css: 'cat-tenue'   },
            repas:   { label: 'Traiteur', icon: 'ph-fork-knife', css: 'cat-repas'   },
            deco:    { label: 'Déco',     icon: 'ph-sparkle',    css: 'cat-deco'    },
            invites: { label: 'Invités',  icon: 'ph-envelope',   css: 'cat-invites' },
            autre:   { label: 'Autre',    icon: 'ph-push-pin',   css: 'cat-autre'   },
        };

        let tasks         = JSON.parse(localStorage.getItem('weddingTasks') || '[]');
        let currentFilter = 'all';

        function saveTasks() {
            localStorage.setItem('weddingTasks', JSON.stringify(tasks));
        }

        // ── AJOUTER ───────────────────────────────────────────────
        function addTask() {
            const input = document.getElementById('taskInput');
            const cat   = document.getElementById('categorySelect').value;
            const text  = input.value.trim();
            if (!text) return;
            tasks.push({ id: Date.now(), text, cat, done: false });
            saveTasks();
            input.value = '';
            renderTasks();
        }

        document.getElementById('taskInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') addTask();
        });

        // ── TOGGLE ────────────────────────────────────────────────
        function toggleTask(id) {
            const t = tasks.find(t => t.id === id);
            if (t) { t.done = !t.done; saveTasks(); renderTasks(); }
        }

        // ── SUPPRIMER ─────────────────────────────────────────────
        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
            renderTasks();
        }

        // ── FILTRER ───────────────────────────────────────────────
        function filterTasks(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderTasks();
        }

        // ── RENDU ─────────────────────────────────────────────────
        function renderTasks() {
            const list     = document.getElementById('todoList');

            // ✅ FIX : copie du tableau pour éviter le bug filtre "Tout"
            const filtered = currentFilter === 'all'
                ? [...tasks]
                : tasks.filter(t => t.cat === currentFilter);

            const done  = tasks.filter(t => t.done).length;
            const total = tasks.length;
            const pct   = total ? Math.round((done / total) * 100) : 0;

            document.getElementById('progressBar').style.width  = pct + '%';
            document.getElementById('progressText').textContent =
                `${done} / ${total} tâche${total > 1 ? 's' : ''} complétée${done > 1 ? 's' : ''}`;

            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty-msg">✦ &nbsp; Aucune tâche &nbsp; ✦</div>';
                return;
            }

            list.innerHTML = filtered.map(t => {
                const cat = categories[t.cat];
                return `
                <div class="todo-item ${t.done ? 'done' : ''}">
                    <div class="custom-checkbox ${t.done ? 'checked' : ''}"
                         onclick="toggleTask(${t.id})">
                        ${t.done ? '<i class="ph ph-check"></i>' : ''}
                    </div>
                    <div class="task-info">
                        <div class="task-text">${t.text}</div>
                        <span class="task-category ${cat.css}">
                            <i class="ph ${cat.icon}"></i>
                            ${cat.label}
                        </span>
                    </div>
                    <button class="delete-btn" onclick="deleteTask(${t.id})">
                        <i class="ph ph-trash"></i>
                    </button>
                </div>`;
            }).join('');
        }

        // ── COMPTE À REBOURS ──────────────────────────────────────
        function updateCountdown() {
            const target = new Date('2026-08-29T00:00:00');
            const now    = new Date();
            const diff   = target - now;

            if (diff <= 0) {
                document.querySelector('.countdown').innerHTML =
                    '<p style="color:#c9a84c;font-size:1.5rem;letter-spacing:3px">✦ C\'est le grand jour ! ✦</p>';
                return;
            }

            const days    = Math.floor(diff / 86400000);
            const hours   = Math.floor((diff % 86400000) / 3600000);
            const minutes = Math.floor((diff % 3600000)  / 60000);
            const seconds = Math.floor((diff % 60000)    / 1000);

            document.getElementById('days').textContent    = String(days).padStart(2, '0');
            document.getElementById('hours').textContent   = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);

        // ── PARTICULES ────────────────────────────────────────────
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.style.left              = Math.random() * 100 + '%';
                p.style.animationDuration = (Math.random() * 15 + 10) + 's';
                p.style.animationDelay    = (Math.random() * 10) + 's';
                if (Math.random() > 0.7) p.style.background = '#fff';
                container.appendChild(p);
            }
        }

        createParticles();
        renderTasks();
    </script>
</body>
</html>
