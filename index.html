<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mélina & Jordan — 29 Août 2026</title>
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #f5f5f5;
            font-family: 'Century Gothic', 'Futura', 'Trebuchet MS', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* PARTICULES */
        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 2px; height: 2px;
            background: #c9a84c;
            border-radius: 50%;
            animation: float linear infinite;
            opacity: 0;
        }

        @keyframes float {
            0%   { transform: translateY(100vh); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        /* HEADER */
        .header {
            text-align: center;
            margin-bottom: 50px;
            z-index: 1;
        }

        .header .et {
            color: #c9a84c;
            font-size: 1rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header h1 {
            font-size: 3.5rem;
            font-weight: normal;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #c9a84c, #f5e6c8, #c9a84c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header .date {
            color: #888;
            font-size: 0.85rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* CARTE */
        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 20px;
            padding: 35px;
            width: 100%;
            max-width: 650px;
            margin-bottom: 25px;
            z-index: 1;
            transition: border-color 0.3s;
        }

        .card:hover {
            border-color: rgba(201,168,76,0.2);
        }

        .card-title {
            font-size: 0.75rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #c9a84c;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(201,168,76,0.2);
        }

        /* PHOTO */
        .photo-container {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(201,168,76,0.15);
        }

        .photo-container img {
            width: 100%;
            height: auto;
            display: block;
            max-height: 400px;
            object-fit: cover;
        }

        /* COMPTE À REBOURS */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .countdown-item {
            text-align: center;
            min-width: 70px;
        }

        .countdown-item .number {
            font-size: 2.8rem;
            font-weight: normal;
            color: #c9a84c;
            background: rgba(201,168,76,0.08);
            border: 1px solid rgba(201,168,76,0.2);
            border-radius: 12px;
            padding: 15px 18px;
            display: block;
            letter-spacing: 2px;
        }

        .countdown-item .label {
            font-size: 0.65rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #555;
            margin-top: 8px;
            display: block;
        }

        /* TÂCHES — FILTRES */
        .filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            color: #666;
            font-family: inherit;
            font-size: 0.72rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 6px 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .filter-btn:hover {
            border-color: rgba(201,168,76,0.3);
            color: #c9a84c;
        }

        .filter-btn.active {
            background: rgba(201,168,76,0.1);
            border-color: rgba(201,168,76,0.5);
            color: #c9a84c;
        }

        /* TÂCHES — AJOUT */
        .add-task {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .add-task input,
        .add-task select {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #f5f5f5;
            font-family: inherit;
            font-size: 0.85rem;
            padding: 10px 15px;
            transition: border-color 0.2s;
            outline: none;
        }

        .add-task input {
            flex: 1;
            min-width: 180px;
        }

        .add-task input::placeholder { color: #444; }

        .add-task input:focus,
        .add-task select:focus {
            border-color: rgba(201,168,76,0.4);
        }

        .add-task select option {
            background: #1a1a1a;
        }

        .add-btn {
            background: rgba(201,168,76,0.1);
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: 10px;
            color: #c9a84c;
            font-family: inherit;
            font-size: 0.85rem;
            padding: 10px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .add-btn:hover {
            background: rgba(201,168,76,0.2);
            border-color: rgba(201,168,76,0.6);
        }

        /* PROGRESSION */
        .progress-bar {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            height: 4px;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #c9a84c, #f5e6c8);
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .progress-text {
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: #444;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        /* TÂCHES — LISTE */
        .task-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            transition: opacity 0.3s;
        }

        .task-item:last-child { border-bottom: none; }
        .task-item.done { opacity: 0.4; }

        .custom-checkbox {
            width: 22px;
            height: 22px;
            border: 1px solid rgba(201,168,76,0.4);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
            color: #c9a84c;
            font-size: 0.9rem;
        }

        .custom-checkbox.checked {
            background: rgba(201,168,76,0.15);
            border-color: #c9a84c;
        }

        .task-info {
            flex: 1;
        }

        .task-text {
            font-size: 0.9rem;
            color: #ddd;
            margin-bottom: 4px;
        }

        .task-item.done .task-text {
            text-decoration: line-through;
            color: #555;
        }

        .task-category {
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #555;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .delete-btn {
            background: transparent;
            border: none;
            color: #333;
            cursor: pointer;
            font-size: 1rem;
            padding: 4px;
            border-radius: 6px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }

        .delete-btn:hover { color: #c0392b; }

        /* MUSIC PLAYER */
        .music-player {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(10,10,10,0.92);
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: 50px;
            padding: 10px 18px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(201,168,76,0.1);
            transition: all 0.3s;
        }

        .music-player:hover {
            border-color: rgba(201,168,76,0.6);
            box-shadow: 0 0 40px rgba(201,168,76,0.2);
        }

        .play-btn {
            background: rgba(201,168,76,0.1);
            border: 1px solid rgba(201,168,76,0.4);
            border-radius: 50%;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #c9a84c;
            font-size: 1.1rem;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .play-btn:hover {
            background: rgba(201,168,76,0.2);
            border-color: #c9a84c;
        }

        .music-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .music-title {
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #c9a84c;
            white-space: nowrap;
        }

        .music-sub {
            font-size: 0.6rem;
            letter-spacing: 1px;
            color: #444;
        }

        .equalizer {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 18px;
        }

        .eq-bar {
            width: 3px;
            background: #c9a84c;
            border-radius: 2px;
            animation: eq linear infinite;
            opacity: 0.6;
        }

        .eq-bar:nth-child(1) { animation-duration: 0.8s; height: 8px; }
        .eq-bar:nth-child(2) { animation-duration: 0.6s; height: 14px; }
        .eq-bar:nth-child(3) { animation-duration: 1.0s; height: 10px; }
        .eq-bar:nth-child(4) { animation-duration: 0.7s; height: 16px; }

        @keyframes eq {
            0%, 100% { transform: scaleY(0.3); }
            50%       { transform: scaleY(1); }
        }

        .equalizer.paused .eq-bar {
            animation-play-state: paused;
            transform: scaleY(0.3);
        }

        .volume-slider {
            -webkit-appearance: none;
            width: 70px;
            height: 3px;
            background: rgba(201,168,76,0.2);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #c9a84c;
            cursor: pointer;
        }

        /* FOOTER */
        .footer {
            text-align: center;
            color: #2a2a2a;
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 20px;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="particles" id="particles"></div>

    <!-- HEADER -->
    <div class="header">
        <div class="et">
            <i class="ph ph-shooting-star"></i>
            Mélina &amp; Jordan
            <i class="ph ph-shooting-star"></i>
        </div>
        <h1>Notre Mariage</h1>
        <div class="date">
            <i class="ph ph-calendar-blank"></i>
            29 Août 2026
            <i class="ph ph-map-pin"></i>
            France
        </div>
    </div>

    <!-- PHOTO -->
    <div class="card">
        <div class="card-title"><i class="ph ph-image"></i> Notre Photo</div>
        <div class="photo-container">
            <img src="photo.jpg" alt="Mélina & Jordan" />
        </div>
    </div>

    <!-- COMPTE À REBOURS -->
    <div class="card">
        <div class="card-title"><i class="ph ph-timer"></i> Compte à rebours</div>
        <div class="countdown">
            <div class="countdown-item">
                <span class="number" id="days">--</span>
                <span class="label">Jours</span>
            </div>
            <div class="countdown-item">
                <span class="number" id="hours">--</span>
                <span class="label">Heures</span>
            </div>
            <div class="countdown-item">
                <span class="number" id="minutes">--</span>
                <span class="label">Minutes</span>
            </div>
            <div class="countdown-item">
                <span class="number" id="seconds">--</span>
                <span class="label">Secondes</span>
            </div>
        </div>
    </div>

    <!-- TÂCHES -->
    <div class="card">
        <div class="card-title"><i class="ph ph-check-square"></i> Liste des tâches</div>

        <div class="add-task">
            <input type="text" id="taskInput" placeholder="Nouvelle tâche..." />
            <select id="taskCategory">
                <option value="venue">Lieu</option>
                <option value="tenues">Tenues</option>
                <option value="traiteur">Traiteur</option>
                <option value="musique">Musique</option>
                <option value="fleurs">Fleurs</option>
                <option value="invites">Invités</option>
                <option value="autre">Autre</option>
            </select>
            <button class="add-btn" onclick="addTask()">
                <i class="ph ph-plus"></i> Ajouter
            </button>
        </div>

        <div class="filters">
            <button class="filter-btn active" onclick="filterTasks('all', this)">
                <i class="ph ph-squares-four"></i> Tout
            </button>
            <button class="filter-btn" onclick="filterTasks('venue', this)">
                <i class="ph ph-buildings"></i> Lieu
            </button>
            <button class="filter-btn" onclick="filterTasks('tenues', this)">
                <i class="ph ph-handbag"></i> Tenues
            </button>
            <button class="filter-btn" onclick="filterTasks('traiteur', this)">
                <i class="ph ph-fork-knife"></i> Traiteur
            </button>
            <button class="filter-btn" onclick="filterTasks('musique', this)">
                <i class="ph ph-music-note"></i> Musique
            </button>
            <button class="filter-btn" onclick="filterTasks('fleurs', this)">
                <i class="ph ph-flower"></i> Fleurs
            </button>
            <button class="filter-btn" onclick="filterTasks('invites', this)">
                <i class="ph ph-users"></i> Invités
            </button>
            <button class="filter-btn" onclick="filterTasks('autre', this)">
                <i class="ph ph-dots-three"></i> Autre
            </button>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
        <div class="progress-text" id="progressText">Aucune tâche</div>

        <div id="taskList"></div>
    </div>

    <!-- FOOTER -->
    <div class="footer">Mélina &amp; Jordan — 29 Août 2026</div>

    <!-- MUSIC PLAYER -->
    <div class="music-player">
        <button class="play-btn" id="playBtn" onclick="toggleMusic()">
            <i class="ph ph-play" id="playIcon"></i>
        </button>
        <div class="music-info">
            <span class="music-title">Notre chanson</span>
            <span class="music-sub">musique.mp3</span>
        </div>
        <div class="equalizer paused" id="equalizer">
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
        </div>
        <input type="range" class="volume-slider" id="volumeSlider"
               min="0" max="1" step="0.01" value="0.7"
               oninput="setVolume(this.value)" />
    </div>

    <audio id="audio" src="musique.mp3" loop></audio>

    <script>
        // ── CATÉGORIES ────────────────────────────────────────────
        const categories = {
            venue:    { label: 'Lieu',     icon: 'ph-buildings'   },
            tenues:   { label: 'Tenues',   icon: 'ph-handbag'     },
            traiteur: { label: 'Traiteur', icon: 'ph-fork-knife'  },
            musique:  { label: 'Musique',  icon: 'ph-music-note'  },
            fleurs:   { label: 'Fleurs',   icon: 'ph-flower'      },
            invites:  { label: 'Invités',  icon: 'ph-users'       },
            autre:    { label: 'Autre',    icon: 'ph-dots-three'  }
        };

        // ── DONNÉES ───────────────────────────────────────────────
        let tasks         = JSON.parse(localStorage.getItem('weddingTasks') || '[]');
        let currentFilter = 'all';

        function saveTasks() {
            localStorage.setItem('weddingTasks', JSON.stringify(tasks));
        }

        // ── AFFICHAGE ─────────────────────────────────────────────
        function renderTasks() {
            const list     = document.getElementById('taskList');
            const filtered = currentFilter === 'all'
                ? tasks
                : tasks.filter(t => t.category === currentFilter);

            const done  = tasks.filter(t => t.done).length;
            const total = tasks.length;
            const pct   = total ? Math.round((done / total) * 100) : 0;

            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('progressText').textContent =
                total === 0
                    ? 'Aucune tâche'
                    : `${done} / ${total} tâche${total > 1 ? 's' : ''} complétée${done > 1 ? 's' : ''}`;

            if (filtered.length === 0) {
                list.innerHTML = '<p style="text-align:center;color:#333;font-size:0.8rem;letter-spacing:2px;padding:30px 0;text-transform:uppercase">Aucune tâche</p>';
                return;
            }

            list.innerHTML = filtered.map(task => {
                const cat = categories[task.category] || categories['autre'];
                return `
                <div class="task-item ${task.done ? 'done' : ''}">
                    <div class="custom-checkbox ${task.done ? 'checked' : ''}" onclick="toggleTask(${task.id})">
                        ${task.done ? '<i class="ph ph-check"></i>' : ''}
                    </div>
                    <div class="task-info">
                        <div class="task-text">${task.text}</div>
                        <span class="task-category">
                            <i class="ph ${cat.icon}"></i> ${cat.label}
                        </span>
                    </div>
                    <button class="delete-btn" onclick="deleteTask(${task.id})">
                        <i class="ph ph-trash"></i>
                    </button>
                </div>`;
            }).join('');
        }

        // ── ACTIONS ───────────────────────────────────────────────
        function addTask() {
            const input = document.getElementById('taskInput');
            const cat   = document.getElementById('taskCategory').value;
            const text  = input.value.trim();
            if (!text) return;
            tasks.push({ id: Date.now(), text, category: cat, done: false });
            saveTasks();
            renderTasks();
            input.value = '';
            input.focus();
        }

        function toggleTask(id) {
            const t = tasks.find(t => t.id === id);
            if (t) { t.done = !t.done; saveTasks(); renderTasks(); }
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
            renderTasks();
        }

        function filterTasks(cat, btn) {
            currentFilter = cat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderTasks();
        }

        document.getElementById('taskInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') addTask();
        });

        // ── MUSIQUE ───────────────────────────────────────────────
        const audio    = document.getElementById('audio');
        const playIcon = document.getElementById('playIcon');
        const eq       = document.getElementById('equalizer');
        let playing    = false;

        audio.volume = 0.7;

        function toggleMusic() {
            if (playing) {
                audio.pause();
                playIcon.className = 'ph ph-play';
                eq.classList.add('paused');
            } else {
                audio.play();
                playIcon.className = 'ph ph-pause';
                eq.classList.remove('paused');
            }
            playing = !playing;
        }

        function setVolume(v) {
            audio.volume = v;
        }

        // ── COMPTE À REBOURS ──────────────────────────────────────
        function updateCountdown() {
            const target = new Date('2026-08-29T00:00:00');
            const now    = new Date();
            const diff   = target - now;

            if (diff <= 0) {
                document.querySelector('.countdown').innerHTML =
                    '<p style="color:#c9a84c;font-size:1.5rem;letter-spacing:3px">✦ C\'est le grand jour ! ✦</p>';
                return;
            }

            const days    = Math.floor(diff / 86400000);
            const hours   = Math.floor((diff % 86400000) / 3600000);
            const minutes = Math.floor((diff % 3600000)  / 60000);
            const seconds = Math.floor((diff % 60000)    / 1000);

            document.getElementById('days').textContent    = String(days).padStart(2, '0');
            document.getElementById('hours').textContent   = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);

        // ── PARTICULES ────────────────────────────────────────────
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.style.left              = Math.random() * 100 + '%';
                p.style.animationDuration = (Math.random() * 15 + 10) + 's';
                p.style.animationDelay    = (Math.random() * 10) + 's';
                if (Math.random() > 0.7) p.style.background = '#fff';
                container.appendChild(p);
            }
        }

        createParticles();
        renderTasks();
    </script>
</body>
</html>
